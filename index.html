<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>鲁科版英语单词卡（Hello Kitty版）</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    body {
      background: #fdf2f8;
      padding: 20px;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 20px;
      margin: 20px 0 30px;
    }
    .kitty {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: url('https://pic.leetcode.cn/1776820465669-5e9d0b7d-3e6e-4e1e-8f7c-7e1a63467666.png') center/cover;
    }
    .title {
      font-size: 24px;
      font-weight: bold;
      color: #e76092;
    }
    .searchBox {
      background: #fff;
      border-radius: 30px;
      padding: 16px 20px;
      margin-bottom: 24px;
      box-shadow: 0 6px 20px rgba(230, 120, 160, 0.1);
    }
    .searchBox input {
      width: 100%;
      border: none;
      outline: none;
      font-size: 16px;
    }
    .gradeRow, .unitRow {
      white-space: nowrap;
      overflow-x: auto;
      margin-bottom: 20px;
      -webkit-overflow-scrolling: touch;
    }
    .gradeBtn, .unitBtn {
      display: inline-block;
      padding: 12px 20px;
      background: #fff;
      border-radius: 50px;
      margin-right: 12px;
      font-size: 14px;
      color: #666;
      cursor: pointer;
    }
    .gradeBtn.on {
      background: #e76092;
      color: #fff;
    }
    .unitBtn.on {
      background: #fec6dd;
      color: #e76092;
    }
    .cardList {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }
    .card {
      background: #fff;
      border-radius: 32px;
      padding: 30px 24px;
      box-shadow: 0 8px 24px rgba(220, 110, 150, 0.12);
      cursor: pointer;
    }
    .wordBox {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      margin-bottom: 12px;
    }
    .word {
      font-size: 28px;
      font-weight: bold;
      color: #333;
    }
    .voice {
      font-size: 20px;
      color: #e76092;
      cursor: pointer;
    }
    .yin {
      text-align: center;
      display: block;
      color: #999;
      font-size: 14px;
      margin-bottom: 8px;
    }
    .cn {
      text-align: center;
      display: block;
      color: #e76092;
      font-size: 16px;
    }
    .backBox {
      text-align: center;
      padding: 20px 0;
    }
    .backTitle {
      font-size: 18px;
      margin-bottom: 20px;
      display: block;
    }
    .writeInput {
      border: 2px solid #eee;
      border-radius: 12px;
      padding: 16px;
      font-size: 18px;
      text-align: center;
      margin-bottom: 16px;
      width: 100%;
    }
    .checkBtn {
      background: #e76092;
      color: #fff;
      border-radius: 12px;
      padding: 12px;
      font-size: 16px;
      text-align: center;
      cursor: pointer;
    }
    .cardFoot {
      margin-top: 24px;
      display: flex;
      justify-content: space-between;
      color: #999;
      font-size: 12px;
    }
    .right {
      color: #07c160;
      font-weight: bold;
    }
    .shareBtn {
      margin: 40px auto;
      width: 80%;
      background: #e76092;
      color: #fff;
      border-radius: 50px;
      padding: 16px;
      font-size: 18px;
      text-align: center;
      cursor: pointer;
    }
  </style>
</head>

    let currentGrade = "三年级";
    let currentUnit = "全部";
    let searchKeyword = "";
    let wordList = [];

    const gradeList = ["三年级", "四年级", "五年级"];
    const unitList = ["全部", "Unit 1", "Unit 2", "Unit 3", "Unit 4", "Unit 5", "Unit 6"];

    function init() {
      renderGrades();
      renderUnits();
      filterWords();
    }

    function renderGrades() {
      const gradeRow = document.getElementById('gradeRow');
      gradeRow.innerHTML = gradeList.map(grade => `
        <span class="gradeBtn ${currentGrade === grade ? 'on' : ''}" onclick="switchGrade('${grade}')">${grade}</span>
      `).join('');
    }

    function renderUnits() {
      const unitRow = document.getElementById('unitRow');
      unitRow.innerHTML = unitList.map(unit => `
        <span class="unitBtn ${currentUnit === unit ? 'on' : ''}" onclick="switchUnit('${unit}')">${unit}</span>
      `).join('');
    }

    function switchGrade(grade) {
      currentGrade = grade;
      currentUnit = "全部";
      renderGrades();
      renderUnits();
      filterWords();
    }

    function switchUnit(unit) {
      currentUnit = unit;
      renderUnits();
      filterWords();
    }

    function onSearch() {
      searchKeyword = document.getElementById('searchInput').value;
      filterWords();
    }

    function filterWords() {
      wordList = allWords.filter(item => {
        const matchGrade = item.grade === currentGrade;
        const matchUnit = currentUnit === "全部" || item.unit === currentUnit;
        const matchSearch = !searchKeyword ||
          item.word.toLowerCase().includes(searchKeyword.toLowerCase()) ||
          item.chinese.includes(searchKeyword);
        return matchGrade && matchUnit && matchSearch;
      });
      renderWordList();
    }

    function renderWordList() {
      const cardList = document.getElementById('cardList');
      cardList.innerHTML = wordList.map((item, index) => `
        <div class="card" onclick="flipCard(${index})">
          ${!item.flipped ? `
            <div>
              <div class="wordBox">
                <span class="word">${item.word}</span>
                <span class="voice" onclick="playAudio('${item.word}'); event.stopPropagation();">🔊</span>
              </div>
              <span class="yin">${item.phonetic}</span>
              <span class="cn">${item.chinese}</span>
            </div>
          ` : `
            <div class="backBox">
              <div class="backTitle">默写：${item.chinese}</div>
              <input class="writeInput" type="text" value="${item.userInput}" oninput="writeInput(${index}, event)" placeholder="请输入英文单词">
              <div class="checkBtn" onclick="checkWord(${index}); event.stopPropagation();">检查答案</div>
              ${item.right ? '<div class="right" style="text-align:center; margin-top:10px;">✓ 正确</div>' : ''}
            </div>
          `}
          <div class="cardFoot">
            <span>${item.grade} · ${item.unit}</span>
          </div>
        </div>
      `).join('');
    }

    function flipCard(index) {
      wordList[index].flipped = !wordList[index].flipped;
      renderWordList();
    }

    function writeInput(index, e) {
      wordList[index].userInput = e.target.value;
    }

    function checkWord(index) {
      const item = wordList[index];
      const isRight = item.word.trim().toLowerCase() === item.userInput.trim().toLowerCase();
      item.right = isRight;
      renderWordList();
      alert(isRight ? "回答正确 ✅" : "再试一次 💪");
    }

    function playAudio(word) {
      const audio = new Audio(`https://dict.youdao.com/dictvoice?audio=${encodeURIComponent(word)}&type=2`);
      audio.play();
    }

    init();
  </script>
</body>
